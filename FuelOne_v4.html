/* Screen 3: Finger Scan */
function Screen3({userData,onComplete}){
  const videoRef=useRef(null);
  const streamRef=useRef(null);
  const canvasRef=useRef(null);
  const procCanvasRef=useRef(null);
  const procCtxRef=useRef(null);
  const animFrameRef=useRef(null);
  const stateRef=useRef({
    redChannel:[],blueChannel:[],greenChannel:[],timestamps:[],filteredSignal:[],
    isRunning:false,startTime:0,BUFFER_SIZE:300,
    rawBpm:null,rawHrv:null,rawSpo2:null,
    stableBpmReadings:[],stableHrvReadings:[],stableSpo2Readings:[]
  });

  const[scanning,setScanning]=useState(false);
  const[countdown,setCountdown]=useState(30);
  const[camReady,setCamReady]=useState(false);
  const[camError,setCamError]=useState(false);
  const[liveBpm,setLiveBpm]=useState(null);
  const[liveHrv,setLiveHrv]=useState(null);
  const[liveSpo2,setLiveSpo2]=useState(null);
  const[signalStatus,setSignalStatus]=useState('waiting');
  const[fingerDetected,setFingerDetected]=useState(false);

  // Compute lifestyle-anchored estimates for clamping
  const anchors=useMemo(()=>{
    const age=Number(userData?.age)||40;
    const sex=userData?.sex||'male';
    const steps=userData?.steps||3000;
    const cardio=userData?.cardioMin||20;
    const sleep=userData?.sleepHours||7;
    const energy=userData?.energyLevel||3;
    const bmi=userData?.bmi||25;
    const fitnessFactor=clamp((steps/10000+cardio/60)/2,0,1);
    const recoveryFactor=clamp((sleep-4)/6,0,1);
    const stressFactor=clamp((5-energy)/4,0,1);
    // Expected HR
    const hrBase=sex==='male'?63:66;
    const hrAge=(age-30)*0.12;
    const hrFit=fitnessFactor*-14;
    const hrBmi=(bmi-22)*0.25;
    const hrStress=stressFactor*4;
    const expectedHR=clamp(Math.round(hrBase+hrAge+hrFit+hrBmi+hrStress),48,92);
    // Expected RMSSD
    const rmssdBase=58;
    const rmssdAge=-(age-25)*0.45;
    const rmssdFit=fitnessFactor*18;
    const rmssdSleep=(recoveryFactor-0.5)*12;
    const rmssdStress=-stressFactor*8;
    const expectedRMSSD=clamp(Math.round(rmssdBase+rmssdAge+rmssdFit+rmssdSleep+rmssdStress),12,85);
    return{expectedHR,expectedRMSSD,expectedSpo2:97};
  },[userData]);

  // Clamp a raw reading to ±10% of anchor
  const anchorClamp=useCallback((raw,anchor)=>{
    const lo=anchor*0.90;
    const hi=anchor*1.10;
    return clamp(raw,lo,hi);
  },[]);

  // Setup processing canvas once
  useEffect(()=>{
    const pc=document.createElement('canvas');
    procCanvasRef.current=pc;
    procCtxRef.current=pc.getContext('2d',{willReadFrequently:true});
  },[]);

  // Camera init
  useEffect(()=>{
    let m=true;
    (async()=>{try{
      const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:320},height:{ideal:240}}});
      if(m&&videoRef.current){
        streamRef.current=s;videoRef.current.srcObject=s;videoRef.current.play();setCamReady(true);
        // Try enable torch
        const track=s.getVideoTracks()[0];
        const caps=track.getCapabilities?track.getCapabilities():{};
        if(caps.torch){try{await track.applyConstraints({advanced:[{torch:true}]})}catch(e){}}
      }
    }catch(e){if(m)setCamError(true)}})();
    return()=>{m=false;if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());if(animFrameRef.current)cancelAnimationFrame(animFrameRef.current)};
  },[]);

  // PPG processing loop
  const processFrame=useCallback(()=>{
    const S=stateRef.current;
    if(!S.isRunning)return;
    const video=videoRef.current;
    const pc=procCanvasRef.current;
    const pctx=procCtxRef.current;
    if(!video||!pc||!pctx||!video.videoWidth)return void(animFrameRef.current=requestAnimationFrame(processFrame));

    pc.width=video.videoWidth/4||80;
    pc.height=video.videoHeight/4||60;
    pctx.drawImage(video,0,0,pc.width,pc.height);
    const frame=pctx.getImageData(0,0,pc.width,pc.height);
    const data=frame.data;
    const pixelCount=data.length/4;
    let rSum=0,gSum=0,bSum=0;
    for(let i=0;i<data.length;i+=4){rSum+=data[i];gSum+=data[i+1];bSum+=data[i+2]}
    const avgR=rSum/pixelCount,avgG=gSum/pixelCount,avgB=bSum/pixelCount;
    S.redChannel.push(avgR);S.greenChannel.push(avgG);S.blueChannel.push(avgB);S.timestamps.push(Date.now());
    if(S.redChannel.length>S.BUFFER_SIZE){S.redChannel.shift();S.greenChannel.shift();S.blueChannel.shift();S.timestamps.shift()}

    // Finger detection
    const isCovered=avgR>100&&avgR>avgG*1.4&&avgR>avgB*1.4;
    setFingerDetected(isCovered);

    // Bandpass filter (moving average detrend)
    const windowSize=15;
    S.filteredSignal=[];
    for(let i=0;i<S.redChannel.length;i++){
      const start=Math.max(0,i-windowSize),end=Math.min(S.redChannel.length,i+windowSize+1);
      let sum=0;for(let j=start;j<end;j++)sum+=S.redChannel[j];
      S.filteredSignal.push(S.redChannel[i]-sum/(end-start));
    }

    // Draw PPG waveform
    const canvas=canvasRef.current;
    if(canvas){
      const dpr=window.devicePixelRatio||1;
      const rect=canvas.getBoundingClientRect();
      canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
      const ctx=canvas.getContext('2d');
      ctx.scale(dpr,dpr);
      const w=rect.width,h=rect.height;
      ctx.clearRect(0,0,w,h);
      // Grid
      ctx.strokeStyle='rgba(0,119,200,.08)';ctx.lineWidth=1;
      for(let y=0;y<h;y+=h/4){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}
      const signal=S.filteredSignal.length>0?S.filteredSignal:S.redChannel;
      if(signal.length>=2){
        const min=Math.min(...signal),max=Math.max(...signal),range=max-min||1;
        ctx.shadowColor='rgba(220,38,38,0.4)';ctx.shadowBlur=6;
        ctx.strokeStyle='#dc2626';ctx.lineWidth=2;ctx.lineJoin='round';ctx.lineCap='round';
        ctx.beginPath();
        signal.forEach((val,i)=>{
          const x=(i/(S.BUFFER_SIZE-1))*w;
          const y=h-((val-min)/range)*(h*0.85)-h*0.075;
          if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
        });
        ctx.stroke();
        ctx.shadowBlur=0;
        ctx.lineTo((signal.length-1)/(S.BUFFER_SIZE-1)*w,h);ctx.lineTo(0,h);ctx.closePath();
        const grad=ctx.createLinearGradient(0,0,0,h);
        grad.addColorStop(0,'rgba(220,38,38,0.12)');grad.addColorStop(1,'rgba(220,38,38,0)');
        ctx.fillStyle=grad;ctx.fill();
      }
    }

    const elapsed=(Date.now()-S.startTime)/1000;

    // Calculate BPM & HRV from PPG
    if(S.filteredSignal.length>=90){
      const recent=S.filteredSignal.slice(-150);
      const recentTs=S.timestamps.slice(-150);
      const maxVal=Math.max(...recent),minVal=Math.min(...recent);
      const threshold=(maxVal+minVal)/2+(maxVal-minVal)*0.1;
      let peaks=[];const minPeakDist=8;
      for(let i=2;i<recent.length-2;i++){
        if(recent[i]>threshold&&recent[i]>recent[i-1]&&recent[i]>recent[i-2]&&recent[i]>recent[i+1]&&recent[i]>recent[i+2]){
          if(peaks.length===0||(i-peaks[peaks.length-1].idx)>=minPeakDist)peaks.push({idx:i,time:recentTs[i]});
        }
      }
      if(peaks.length>=3){
        let intervals=[];
        for(let i=1;i<peaks.length;i++){const rr=peaks[i].time-peaks[i-1].time;if(rr>300&&rr<1500)intervals.push(rr)}
        if(intervals.length>=2){
          const sorted=[...intervals].sort((a,b)=>a-b);
          const medianInterval=sorted[Math.floor(sorted.length/2)];
          const rawBpm=Math.round(60000/medianInterval);
          if(rawBpm>=40&&rawBpm<=200){
            S.rawBpm=rawBpm;
            const clamped=Math.round(anchorClamp(rawBpm,anchors.expectedHR));
            if(isCovered&&elapsed>5){S.stableBpmReadings.push(clamped);setLiveBpm(clamped)}
          }
          if(intervals.length>=3){
            let sqDiffSum=0;
            for(let i=1;i<intervals.length;i++)sqDiffSum+=Math.pow(intervals[i]-intervals[i-1],2);
            const rmssd=Math.sqrt(sqDiffSum/(intervals.length-1));
            if(rmssd>0&&rmssd<300){
              S.rawHrv=rmssd;
              const clamped=Math.round(anchorClamp(rmssd,anchors.expectedRMSSD));
              if(isCovered&&elapsed>5){S.stableHrvReadings.push(clamped);setLiveHrv(clamped)}
            }
          }
        }
      }

      // SpO2 estimation
      if(S.redChannel.length>=90){
        const n=90;
        const rSlice=S.redChannel.slice(-n),bSlice=S.blueChannel.slice(-n);
        const rMean=rSlice.reduce((a,b)=>a+b)/n,bMean=bSlice.reduce((a,b)=>a+b)/n;
        let rAcSum=0,bAcSum=0;
        for(let i=0;i<n;i++){rAcSum+=Math.pow(rSlice[i]-rMean,2);bAcSum+=Math.pow(bSlice[i]-bMean,2)}
        const rAc=Math.sqrt(rAcSum/n),bAc=Math.sqrt(bAcSum/n);
        if(rMean>0&&bMean>0&&bAc>0){
          const R=(rAc/rMean)/(bAc/bMean);
          let spo2=Math.round(110-25*R);
          spo2=clamp(spo2,70,100);
          spo2=Math.round(anchorClamp(spo2,anchors.expectedSpo2));
          if(rAc>0.3&&rMean>80&&isCovered&&elapsed>5){S.stableSpo2Readings.push(spo2);setLiveSpo2(spo2)}
        }
      }

      if(isCovered&&elapsed>5)setSignalStatus('good');
      else if(elapsed>3)setSignalStatus('acquiring');
    }

    animFrameRef.current=requestAnimationFrame(processFrame);
  },[anchors,anchorClamp]);

  // Start scanning
  const startScan=useCallback(()=>{
    const S=stateRef.current;
    S.isRunning=true;S.startTime=Date.now();
    S.redChannel=[];S.blueChannel=[];S.greenChannel=[];S.timestamps=[];S.filteredSignal=[];
    S.rawBpm=null;S.rawHrv=null;S.rawSpo2=null;
    S.stableBpmReadings=[];S.stableHrvReadings=[];S.stableSpo2Readings=[];
    setScanning(true);setCountdown(30);setLiveBpm(null);setLiveHrv(null);setLiveSpo2(null);setSignalStatus('waiting');
    processFrame();
  },[processFrame]);

  // Countdown timer
  useEffect(()=>{
    if(!scanning)return;
    if(countdown<=0){
      stateRef.current.isRunning=false;
      if(animFrameRef.current)cancelAnimationFrame(animFrameRef.current);
      if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());
      // Build final data: merge PPG readings with generated scan data
      const S=stateRef.current;
      const baseData=generateFingerScanData(userData);
      // Use median of stable readings if available
      const median=arr=>{if(!arr.length)return null;const s=[...arr].sort((a,b)=>a-b);return s[Math.floor(s.length/2)]};
      const finalHR=median(S.stableBpmReadings)||baseData.heartRate;
      const finalRMSSD=median(S.stableHrvReadings)||baseData.rmssd;
      // Derive SDNN from RMSSD with realistic ratio
      const sdnnRatio=baseData.sdnn/Math.max(1,baseData.rmssd);
      const finalSDNN=clamp(Math.round(finalRMSSD*sdnnRatio),22,95);
      onComplete({...baseData,heartRate:finalHR,rmssd:finalRMSSD,sdnn:finalSDNN});
      return;
    }
    const t=setTimeout(()=>setCountdown(c=>c-1),1000);
    return()=>clearTimeout(t);
  },[scanning,countdown]);

  const skip=()=>{
    stateRef.current.isRunning=false;
    if(animFrameRef.current)cancelAnimationFrame(animFrameRef.current);
    if(streamRef.current)streamRef.current.getTracks().forEach(t=>t.stop());
    onComplete(generateFingerScanData(userData));
  };

  const signalColor=signalStatus==='good'?'var(--excellent)':signalStatus==='acquiring'?'var(--older)':'var(--text-muted)';
  const signalLabel=signalStatus==='good'?'Signal Locked':signalStatus==='acquiring'?'Acquiring…':'Waiting';

  return(
    <div className="fade-in">
      <div className="screen-header"><div className="screen-step">Step 3 of 11</div><div className="screen-title">Finger Scan</div><div className="screen-subtitle">Place your fingertip over the rear camera lens</div></div>

      {/* Camera ring with PPG */}
      <div style={{position:'relative'}}>
        <div className={`camera-ring ${scanning?'scanning':''}`} style={{width:200,height:200,margin:'10px auto',border:fingerDetected&&scanning?'4px solid #dc2626':'4px solid var(--border)',transition:'border-color .3s'}}>
          <video ref={videoRef} playsInline muted style={{width:'100%',height:'100%',objectFit:'cover',transform:'scaleX(-1)'}}/>
          {scanning&&<div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:'2rem',color:'white',textShadow:'0 0 20px rgba(220,38,38,.5)',pointerEvents:'none'}}>{fingerDetected?'♥':'☝️'}</div>}
        </div>
        {scanning&&<div style={{position:'absolute',top:8,right:'calc(50% - 108px)',fontSize:'.62rem',fontWeight:700,padding:'3px 8px',borderRadius:8,background:'rgba(0,0,0,.5)',color:signalColor,backdropFilter:'blur(4px)',letterSpacing:'.06em'}}>{signalLabel}</div>}
      </div>

      {/* PPG Waveform */}
      {scanning&&(
        <div className="card" style={{padding:'12px 14px',marginBottom:12,background:'var(--bg2)'}}>
          <div style={{fontSize:'.6rem',textTransform:'uppercase',letterSpacing:'.1em',color:'var(--text-muted)',marginBottom:6,fontWeight:600}}>PPG Waveform</div>
          <canvas ref={canvasRef} style={{width:'100%',height:80,display:'block',borderRadius:8}}/>
        </div>
      )}

      {/* Live vitals display */}
      {scanning&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
          <div className="card" style={{padding:'10px 8px',textAlign:'center',borderLeft:'3px solid #dc2626'}}>
            <div style={{fontSize:'.58rem',textTransform:'uppercase',letterSpacing:'.08em',color:'var(--text-muted)',fontWeight:600}}>Heart Rate</div>
            <div style={{fontFamily:'var(--serif)',fontSize:'1.4rem',color:liveBpm?'#dc2626':'var(--text-muted)',fontWeight:600,margin:'2px 0'}}>{liveBpm||'--'}</div>
            <div style={{fontSize:'.58rem',color:'var(--text-muted)'}}>BPM</div>
          </div>
          <div className="card" style={{padding:'10px 8px',textAlign:'center',borderLeft:'3px solid var(--accent)'}}>
            <div style={{fontSize:'.58rem',textTransform:'uppercase',letterSpacing:'.08em',color:'var(--text-muted)',fontWeight:600}}>HRV</div>
            <div style={{fontFamily:'var(--serif)',fontSize:'1.4rem',color:liveHrv?'var(--accent)':'var(--text-muted)',fontWeight:600,margin:'2px 0'}}>{liveHrv||'--'}</div>
            <div style={{fontSize:'.58rem',color:'var(--text-muted)'}}>ms</div>
          </div>
          <div className="card" style={{padding:'10px 8px',textAlign:'center',borderLeft:'3px solid #3ddc84'}}>
            <div style={{fontSize:'.58rem',textTransform:'uppercase',letterSpacing:'.08em',color:'var(--text-muted)',fontWeight:600}}>SpO₂</div>
            <div style={{fontFamily:'var(--serif)',fontSize:'1.4rem',color:liveSpo2?'#3ddc84':'var(--text-muted)',fontWeight:600,margin:'2px 0'}}>{liveSpo2||'--'}</div>
            <div style={{fontSize:'.58rem',color:'var(--text-muted)'}}>%</div>
          </div>
        </div>
      )}

      {scanning?(
        <>
          <div className="countdown">{countdown}</div>
          <div className="countdown-label">seconds — keep your finger steady</div>
          {/* Anchored estimate info */}
          <div style={{textAlign:'center',fontSize:'.62rem',color:'var(--text-muted)',marginTop:8,lineHeight:1.5}}>
            Readings are anchored to your lifestyle profile<br/>
            Expected HR: ~{anchors.expectedHR} bpm · HRV: ~{anchors.expectedRMSSD} ms
          </div>
        </>
      ):(
        <>
          {camReady&&<button className="btn btn-start" onClick={startScan}>Start 30-Second Scan</button>}
          {camError&&<p style={{color:'var(--text-dim)',fontSize:'.82rem',textAlign:'center',marginBottom:10}}>Camera not available</p>}
          <button className="btn btn-secondary" style={{marginTop:8}} onClick={skip}>{camError?'Sync Your Wearable Data (Demo Data)':'Sync Your Wearable Data (Demo Data)'}</button>
          <div style={{marginTop:12,padding:'12px 14px',background:'var(--bg2)',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)'}}>
            <div style={{fontSize:'.72rem',fontWeight:600,color:'var(--text)',marginBottom:6}}>How to scan:</div>
            <div style={{fontSize:'.72rem',color:'var(--text-dim)',lineHeight:1.6}}>
              1. Tap <strong>Start</strong> and allow camera access<br/>
              2. Place your <strong>fingertip</strong> gently over the rear camera lens<br/>
              3. The flash may turn on — keep your finger still<br/>
              4. Wait 15–20 seconds for stable readings
            </div>
          </div>
        </>
      )}
      <div style={{textAlign:'center',fontSize:'.58rem',color:'var(--text-muted)',marginTop:10}}>⚠ For wellness use only. Not a medical device.</div>

      {/* Collapsible PPG Info */}
      <PPGInfoPanel/>
    </div>
  );
}

/* ─── Body Scan: Pose analysis helpers ─── */
/* MoveNet keypoint indices:
   0=nose 1=l_eye 2=r_eye 3=l_ear 4=r_ear
   5=l_shoulder 6=r_shoulder 7=l_elbow 8=r_elbow
   9=l_wrist 10=r_wrist 11=l_hip 12=r_hip
   13=l_knee 14=r_knee 15=l_ankle 16=r_ankle */

function analyzePose(keypoints, vw, vh, isSideView){
  // Returns {score, feedback[], status:'good'|'warn'|'bad'}
  // Thresholds are intentionally generous so users reach 'good' in normal conditions.
  const MIN_CONF = 0.20;   // lowered from 0.25 — MoveNet can be confident at 0.20+
  const get = i => keypoints[i]&&keypoints[i].score>MIN_CONF ? keypoints[i] : null;

  const nose      = get(0);
  const lShoulder = get(5);
  const rShoulder = get(6);
  const lHip      = get(11);
  const rHip      = get(12);
  const lElbow    = get(7);
  const rElbow    = get(8);

  const feedback = [];
  let penalties = 0;

  const visible = [nose,lShoulder,rShoulder,lHip,rHip].filter(Boolean).length;
  if(visible < 2){
    return {score:0, feedback:[isSideView?'No person detected — turn sideways':'Step in front of the camera'], status:'bad'};
  }

  if(isSideView){
    // ── SIDE VIEW ──────────────────────────────────────────────────────────
    const domShoulder = (lShoulder && rShoulder)
      ? (lShoulder.score > rShoulder.score ? lShoulder : rShoulder)
      : (lShoulder || rShoulder);
    const domHip = (lHip && rHip)
      ? (lHip.score > rHip.score ? lHip : rHip)
      : (lHip || rHip);

    // 1. Distance: torso covers 15–75% of frame height (generous)
    if(domShoulder && domHip){
      const torsoFrac = Math.abs(domHip.y - domShoulder.y) / vh;
      if(torsoFrac < 0.15){ feedback.push('Too far away — step a bit closer'); penalties+=2; }
      else if(torsoFrac > 0.75){ feedback.push('Too close — step back a little'); penalties+=2; }
    }

    // 2. Roughly centred (wide zone — 20–80%)
    if(nose){
      const mid = nose.x / vw;
      if(mid < 0.20){ feedback.push('Shift a little to the right'); penalties+=1; }
      else if(mid > 0.80){ feedback.push('Shift a little to the left'); penalties+=1; }
    }

    // 3. Shoulder span narrow = turned sideways (only penalise if very wide)
    if(lShoulder && rShoulder){
      const span = Math.abs(lShoulder.x - rShoulder.x) / vw;
      if(span > 0.40){ feedback.push('Turn more to the side — shoulder to camera'); penalties+=2; }
      else if(span > 0.28){ feedback.push('Turn a bit more sideways'); penalties+=1; }
    }

    // 4. Head in upper half of frame
    if(nose){
      const rel = nose.y / vh;
      if(rel < 0.04){ feedback.push('Step back — head is cut off'); penalties+=2; }
      else if(rel > 0.50){ feedback.push('Move higher in frame'); penalties+=1; }
    }

    // Arms-forward check removed — too hard to satisfy reliably via MoveNet side view

  } else {
    // ── FRONT VIEW ────────────────────────────────────────────────────────

    // 1. Shoulder span 15–78% of frame width (generous range)
    if(lShoulder && rShoulder){
      const span = Math.abs(lShoulder.x - rShoulder.x) / vw;
      if(span < 0.15){ feedback.push('Too far away — step a bit closer'); penalties+=2; }
      else if(span > 0.78){ feedback.push('Too close — step back a little'); penalties+=2; }
    }

    // 2. Horizontal centering: midpoint within 22–78% (wide zone)
    if(lShoulder && rShoulder){
      const mid = (lShoulder.x + rShoulder.x) / 2 / vw;
      if(mid < 0.22){ feedback.push('Move a little to the right'); penalties+=1; }
      else if(mid > 0.78){ feedback.push('Move a little to the left'); penalties+=1; }
    } else if(nose){
      const mid = nose.x / vw;
      if(mid < 0.22){ feedback.push('Move a little to the right'); penalties+=1; }
      else if(mid > 0.78){ feedback.push('Move a little to the left'); penalties+=1; }
    }

    // 3. Head in upper 50% (was 40% — much more achievable)
    if(nose){
      const rel = nose.y / vh;
      if(rel < 0.04){ feedback.push('Step back — head is cut off'); penalties+=2; }
      else if(rel > 0.50){ feedback.push('Point camera up or stand taller'); penalties+=1; }
    }

    // 4. Shoulder tilt (loosened threshold 0.06 → 0.10)
    if(lShoulder && rShoulder){
      const tilt = Math.abs(lShoulder.y - rShoulder.y) / vh;
      if(tilt > 0.10){ feedback.push('Stand straight — shoulders are uneven'); penalties+=1; }
    }

    // 5. Arms check: only penalise 0.25 (hint, not blocker) and only if BOTH elbows hug body
    if(lShoulder && lElbow && rShoulder && rElbow){
      const lGap = Math.abs(lElbow.x - lShoulder.x) / vw;
      const rGap = Math.abs(rElbow.x - rShoulder.x) / vw;
      if(lGap < 0.02 && rGap < 0.02){
        feedback.push('Arms slightly away from your sides for best accuracy');
        penalties += 0.25;   // small hint, not a position blocker
      }
    }
  }

  // Score: each penalty point = 15 pts lost (was 20 — more forgiving)
  const score = Math.max(0, Math.round(100 - penalties*15));
  // 'good' threshold lowered from 75 to 70
  const status = score >= 70 ? 'good' : score >= 40 ? 'warn' : 'bad';
  if(feedback.length === 0) feedback.push(isSideView ? 'Great side profile — hold still!' : 'Perfect — hold still!');

  return {score, feedback, status};
}

/* ── Reusable camera panel used for both front and side shots ── */
function CameraPanel({ isSideView, onPhotoCaptured, onSkipAll, onSkipThis, showSkipAll }){
  const videoRef    = useRef(null);
  const canvasRef   = useRef(null);
  const streamRef   = useRef(null);
  const detectorRef = useRef(null);
  const rafRef      = useRef(null);
  const timerRef    = useRef(null);

  const[camActive,   setCamActive]   = useState(false);
  const[camErr,      setCamErr]      = useState(false);
  const[preview,     setPreview]     = useState(null);
  const[poseStatus,  setPoseStatus]  = useState(null);
  const[modelReady,  setModelReady]  = useState(false);
  const[modelLoading,setModelLoading]= useState(false);
  const[countdown,   setCountdown]   = useState(null);
  const[isCounting,  setIsCounting]  = useState(false);

  useEffect(()=>{
    if(!camActive) return;
    let cancelled=false;
    (async()=>{
      setModelLoading(true);
      try{
        if(typeof poseDetection==='undefined'){setModelReady(false);setModelLoading(false);return;}
        const det=await poseDetection.createDetector(
          poseDetection.SupportedModels.MoveNet,
          {modelType:poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING}
        );
        if(!cancelled){detectorRef.current=det;setModelReady(true);}
      }catch(e){console.warn('Pose load failed',e);}
      if(!cancelled) setModelLoading(false);
    })();
    return()=>{cancelled=true;};
  },[camActive]);

  useEffect(()=>{
    if(!modelReady||!camActive) return;
    let alive=true;
    const loop=async()=>{
      if(!alive||!videoRef.current||videoRef.current.readyState<2){
        if(alive) rafRef.current=requestAnimationFrame(loop); return;
      }
      const v=videoRef.current;
      try{
        const poses=await detectorRef.current.estimatePoses(v);
        if(poses&&poses[0]){
          const kps=poses[0].keypoints;
          const result=analyzePose(kps,v.videoWidth||320,v.videoHeight||240,isSideView);
          if(alive) setPoseStatus(result);
          const cv=canvasRef.current;
          if(cv){
            cv.width=v.videoWidth||320; cv.height=v.videoHeight||240;
            const ctx=cv.getContext('2d');
            ctx.clearRect(0,0,cv.width,cv.height);
            const dc=result.status==='good'?'#22c55e':result.status==='warn'?'#f59e0b':'#ef4444';
            kps.forEach(kp=>{
              if(kp.score>0.3){
                const mx=cv.width-kp.x;
                ctx.beginPath();ctx.arc(mx,kp.y,5,0,Math.PI*2);ctx.fillStyle=dc;ctx.fill();
                ctx.beginPath();ctx.arc(mx,kp.y,8,0,Math.PI*2);ctx.strokeStyle=dc+'88';ctx.lineWidth=2;ctx.stroke();
              }
            });
            const conn=[[5,6],[5,7],[7,9],[6,8],[8,10],[5,11],[6,12],[11,12],[11,13],[12,14]];
            ctx.lineWidth=2.5; ctx.strokeStyle=dc+'99';
            conn.forEach(([a,b])=>{
              const ka=kps[a],kb=kps[b];
              if(ka&&kb&&ka.score>0.3&&kb.score>0.3){
                ctx.beginPath();ctx.moveTo(cv.width-ka.x,ka.y);ctx.lineTo(cv.width-kb.x,kb.y);ctx.stroke();
              }
            });
          }
        }else if(alive) setPoseStatus({score:0,feedback:[isSideView?'Turn sideways to the camera':'Step in front of the camera'],status:'bad'});
      }catch(e){}
      if(alive) rafRef.current=setTimeout(()=>requestAnimationFrame(loop),100);
    };
    rafRef.current=requestAnimationFrame(loop);
    return()=>{alive=false;if(rafRef.current)clearTimeout(rafRef.current);};
  },[modelReady,camActive,isSideView]);

  useEffect(()=>{
    if(streamRef.current&&videoRef.current){
      videoRef.current.srcObject=streamRef.current;
      videoRef.current.play().catch(()=>{});
    }
  },[camActive]);

  const startCam=async()=>{
    try{
      const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}}});
      streamRef.current=s; setCamActive(true); setPreview(null);
    }catch(e){console.error(e);setCamErr(true);}
  };

  const stopStreams=()=>{
    if(rafRef.current)clearTimeout(rafRef.current);
    if(timerRef.current)clearInterval(timerRef.current);
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
  };

  const startCountdown=()=>{
    if(isCounting)return;
    setIsCounting(true); setCountdown(10);
    let n=10;
    timerRef.current=setInterval(()=>{
      n--;
      if(n>0){setCountdown(n);}
      else{
        clearInterval(timerRef.current); setCountdown('📸');
        setTimeout(()=>doCapture(),350);
      }
    },1000);
  };

  const cancelCountdown=()=>{
    if(timerRef.current)clearInterval(timerRef.current);
    setCountdown(null); setIsCounting(false);
  };

  const doCapture=()=>{
    const v=videoRef.current;
    if(!v||!v.videoWidth)return;
    const c=document.createElement('canvas');
    c.width=v.videoWidth; c.height=v.videoHeight;
    c.getContext('2d').drawImage(v,0,0);
    const d=c.toDataURL('image/jpeg',0.88);
    stopStreams(); setCamActive(false); setIsCounting(false); setCountdown(null); setPoseStatus(null);
    setPreview(d);
  };

  const retake=()=>{setPreview(null);startCam();};
  const handleFile=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>setPreview(ev.target.result);
    r.readAsDataURL(f);
  };
  useEffect(()=>()=>stopStreams(),[]);

  const statusColors={good:'#22c55e',warn:'#f59e0b',bad:'#ef4444'};
  const statusIcons={good:'✅',warn:'⚠️',bad:'❌'};
  const sc=poseStatus?statusColors[poseStatus.status]:'var(--accent)';
  const silColor=poseStatus?.status==='good'?'#22c55e':poseStatus?.status==='warn'?'#f59e0b':'#00E5FF';

  const silAnim = poseStatus?.status==='good' ? 'silGoodPulse 1.5s ease-in-out infinite' : 'none';

  const SideSilhouette=()=>(
    <svg viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg" style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none'}}>
      <g fill="none" stroke={silColor} strokeWidth="2.5" strokeLinecap="round" opacity="0.55" style={{transition:'stroke .4s',animation:silAnim}}>
        <ellipse cx="108" cy="30" rx="20" ry="26"/>
        <path d="M100 54 L98 70"/>
        <path d="M116 54 L114 68"/>
        <path d="M98 70 Q90 90 88 115 Q86 135 92 155 Q96 168 100 175"/>
        <path d="M114 68 Q120 88 118 112 Q116 132 112 152 Q108 165 104 175"/>
        <path d="M100 175 Q95 185 94 195 Q95 205 100 210"/>
        <path d="M104 175 Q112 185 114 195 Q112 205 106 210"/>
        <path d="M100 210 L98 255"/>
        <path d="M106 210 L108 255"/>
        <path d="M98 78 Q85 95 82 120 Q80 140 84 155"/>
      </g>
      <g fill="none" stroke={silColor} strokeWidth="1" opacity="0.35" strokeDasharray="3 3">
        <path d="M88 115 L68 115"/>
        <path d="M114 115 L134 115"/>
      </g>
      <text x="48" y="112" fontSize="9" fill={silColor} opacity="0.5" textAnchor="middle">depth</text>
    </svg>
  );

  return(
    <div>
      <div style={{position:'relative',width:'100%',aspectRatio:'3/4',borderRadius:'var(--radius)',overflow:'hidden',
        border:`1.5px solid ${preview?'var(--accent)':'var(--border)'}`,marginBottom:12,background:'#0a0f1a'}}>

        {camActive&&!preview&&(
          <>
            <video ref={videoRef} playsInline muted autoPlay
              style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',transform:'scaleX(-1)'}}/>
            <canvas ref={canvasRef}
              style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none'}}/>
            {isSideView ? <SideSilhouette/> : (
              <svg viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg"
                style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none'}}>
                <g fill="none" stroke={silColor} strokeWidth="2.5" strokeLinecap="round" opacity="0.55" style={{transition:'stroke .4s',animation:silAnim}}>
                  <ellipse cx="100" cy="28" rx="24" ry="28"/>
                  <path d="M88 54 Q72 58 56 70 Q44 80 38 100"/>
                  <path d="M112 54 Q128 58 144 70 Q156 80 162 100"/>
                  <path d="M56 70 Q52 82 50 100 L48 140 Q46 160 52 175 L60 200"/>
                  <path d="M144 70 Q148 82 150 100 L152 140 Q154 160 148 175 L140 200"/>
                  <path d="M60 200 Q80 210 100 211 Q120 210 140 200"/>
                  <path d="M60 200 L56 255"/><path d="M140 200 L144 255"/>
                  <path d="M84 211 L82 255"/><path d="M116 211 L118 255"/>
                </g>
              </svg>
            )}
          </>
        )}

        {preview&&(
          <>
            <img src={preview} alt="Captured" style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover'}}/>
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,.25)'}}>
              <div style={{width:64,height:64,borderRadius:'50%',background:'rgba(34,197,94,.85)',display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:'2rem',boxShadow:'0 0 0 8px rgba(34,197,94,.25)'}}>&#x2713;</div>
            </div>
          </>
        )}

        {isCounting&&(
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',
            alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,.45)',backdropFilter:'blur(2px)',zIndex:20,pointerEvents:'none'}}>
            <div style={{fontFamily:'var(--serif)',fontSize:typeof countdown==='number'?'6rem':'4rem',fontWeight:700,
              color:'#fff',textShadow:`0 0 40px ${typeof countdown!=='number'?'#22c55e':'#00E5FF'}`,lineHeight:1,
              animation:'countUp .35s ease-out'}}>
              {countdown}
            </div>
            <div style={{color:'rgba(255,255,255,.8)',fontSize:'.88rem',marginTop:12,fontWeight:600,letterSpacing:'.05em'}}>
              {typeof countdown!=='number'?'Capturing…':'Hold still!'}
            </div>
          </div>

        {/* ── Position-Good banner — shown at bottom of camera view ── */}
        {camActive&&!isCounting&&poseStatus?.status==='good'&&(
          <div style={{
            position:'absolute',bottom:10,left:'50%',transform:'translateX(-50%)',
            background:'rgba(34,197,94,.90)',backdropFilter:'blur(4px)',
            borderRadius:20,padding:'6px 18px',zIndex:18,
            display:'flex',alignItems:'center',gap:6,
            animation:'fadeIn .3s ease-out'

            <span style={{fontSize:'1rem'}}>✅</span>
            <span style={{fontSize:'.78rem',fontWeight:700,color:'#fff',letterSpacing:'.04em'}}>
              POSITION GOOD — tap shutter
            </span>
          </div>

        {camActive&&modelLoading&&!modelReady&&(
          <div style={{position:'absolute',top:10,left:'50%',transform:'translateX(-50%)',
            background:'rgba(0,0,0,.6)',backdropFilter:'blur(6px)',
            borderRadius:20,padding:'4px 12px',fontSize:'.62rem',color:'#aaa',
            letterSpacing:'.06em',fontWeight:600,zIndex:15,whiteSpace:'nowrap'}}>⏳ Loading pose AI…</div>
        )}

        {!camActive&&!preview&&(
          <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
            height:'100%',color:'var(--text-muted)',gap:12,padding:'0 24px',textAlign:'center'}}>
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            <p style={{fontSize:'.82rem',lineHeight:1.5,margin:0}}>
              {isSideView

                : 'Front-facing photo — stand facing the camera, arms slightly out'

                  <div key={i} style={{display:'flex',alignItems:'center',gap:6,fontSize:'.76rem',color:'var(--text)',lineHeight:1.4}}>

                  </div>
                ))}
              </div>

        </div>
      )}

      {preview ? (
        <div style={{display:'flex',gap:8,marginBottom:8}}>

/* Screen 6: Analyzing */
function Screen6({userData,photos,onComplete}){
  // photos = {front, side} | null
  const frontPhoto = photos?.front ?? null;
  const sidePhoto  = photos?.side  ?? null;
  const [stage,setStage]=React.useState(0);
  const [statusMsg,setStatusMsg]=React.useState('');
  const stages=[
    {icon:'📐',text:'Detecting body keypoints…'},
    {icon:'📏',text:'Measuring waist, hip & shoulder widths…'},
    {icon:'📊',text:'Running Navy circumference equations…'},
    {icon:'🗺️',text:'Mapping android & gynoid fat zones…'},
    {icon:'⚡',text:'Calculating FFMI, FMI & RMR…'},
    {icon:'✅',text:'Finalising body composition report…'},
  ];

  useEffect(()=>{
    let alive = true;
    let stageIdx = 0;

    const advance = ()=>{
      if(!alive) return;
      stageIdx++;
      setStage(stageIdx);
    };

    const run = async()=>{
      setStage(0);
      let photoMeasurements = null;

      if(frontPhoto){
        try{
          // Kick off extraction (loads MoveNet, processes both photos concurrently)
          const measurePromise = extractPhotoMeasurements(
            frontPhoto, userData.height, userData.sex, userData, sidePhoto
          );
          await new Promise(r => setTimeout(r, 600));
          advance(); // → stage 1 (measuring widths)
          photoMeasurements = await measurePromise;
          if(photoMeasurements){
            const depthSrc = photoMeasurements.hasSideDepth ? '+ side depth' : '(front only)';
            if(alive) setStatusMsg(`Keypoints detected ${depthSrc} · ${photoMeasurements.keypointConf}% confidence`);
          } else {
            if(alive) setStatusMsg('Keypoint extraction incomplete — using biometric estimates');
          }
        }catch(e){
          console.warn('Photo measurement error:', e);
          if(alive) setStatusMsg('Photo analysis unavailable — using biometric estimates');
        }
      } else {
        setStage(2);
        stageIdx = 2;
      }

      const remainingStages = frontPhoto ? [2, 3, 4, 5] : [3, 4, 5];
      for(const s of remainingStages){
        await new Promise(r => setTimeout(r, 480));
        if(alive) setStage(s);
      }

      await new Promise(r => setTimeout(r, 400));
      if(alive) onComplete(calculateBodyComposition(userData, photoMeasurements));
    };

    run();
    return ()=>{ alive=false; };
  },[]);
  return(
    <div className="fade-in">
      <div className="loading-container">
        <div className="spinner"/>
        <div style={{fontSize:'1.4rem',marginBottom:8}}>{stages[stage]?.icon}</div>
        <div className="loading-text">{stages[stage]?.text}</div>
        {(frontPhoto||sidePhoto)&&(
          <div style={{display:'flex',gap:8,marginTop:16,justifyContent:'center'}}>
            {frontPhoto&&<div style={{textAlign:'center'}}>
              <img src={frontPhoto} alt="front" style={{width:60,height:80,objectFit:'cover',borderRadius:8,opacity:.5,border:'1px solid #22c55e'}}/>
              <div style={{fontSize:'.58rem',color:'#22c55e',marginTop:3,fontWeight:600}}>FRONT</div>
            </div>}
            {sidePhoto&&<div style={{textAlign:'center'}}>
              <img src={sidePhoto} alt="side" style={{width:60,height:80,objectFit:'cover',borderRadius:8,opacity:.5,border:'1px solid #14b8a6'}}/>
              <div style={{fontSize:'.58rem',color:'#14b8a6',marginTop:3,fontWeight:600}}>SIDE</div>
            </div>}
          </div>
        )}
        <div style={{marginTop:14,display:'flex',gap:5}}>
          {stages.map((_,i)=>(
            <div key={i} style={{width:i<=stage?20:7,height:5,borderRadius:3,background:i<=stage?'var(--accent)':'var(--border)',transition:'all .4s ease'}}/>
          ))}
        </div>
        <div style={{marginTop:12,fontSize:'.7rem',color:'var(--text-muted)',textAlign:'center',maxWidth:280,lineHeight:1.5}}>
          {statusMsg
            ? <span style={{color: statusMsg.includes('incomplete')||statusMsg.includes('unavailable') ? 'var(--older)' : '#22c55e'}}>{statusMsg}</span>
            : frontPhoto
              ? sidePhoto
                ? '🔬 Analysing front + side geometry…'
                : '🔬 Analysing front photo geometry…'
              : 'Using height, weight & lifestyle inputs for estimation'
          }
        </div>
      </div>
    </div>
  );
}

const PHYS_AGE_INFO={
  cardiovascular:{
    what:'Cardiovascular Age reflects the biological age of your heart and vascular system. It is calculated from your estimated VO₂max (aerobic capacity), heart rate variability (both RMSSD and SDNN), resting heart rate, and recovery capacity.',
    why:'Cardiovascular age is the single strongest predictor of all-cause mortality. Your heart and vascular system determine how much oxygen your body can deliver to tissues, how efficiently you recover from stress, and how rapidly you age at the cellular level. A cardiovascular age younger than your chronological age is among the most powerful longevity indicators.',
    improve:'Every 1 MET increase in VO₂max corresponds to a ~13% reduction in all-cause mortality risk. Zone 2 cardio, HIIT, resistance training, quality sleep, and stress management are the most evidence-based interventions to lower cardiovascular age.'
  },
  metabolic:{
    what:'Metabolic Age reflects the biological age of your metabolism — how efficiently your body processes energy, maintains body composition, and regulates blood sugar. It is derived from your Fat-Free Mass Index (FFMI), Fat Mass Index (FMI), visceral fat distribution (android/gynoid ratio), and resting metabolic rate (RMR).',
    why:'Metabolic age determines your risk for type 2 diabetes, metabolic syndrome, cardiovascular disease, and cancer. As metabolic age increases beyond chronological age, insulin sensitivity declines, systemic inflammation rises, and the body loses its ability to maintain healthy body composition. Metabolic aging is highly reversible with targeted interventions.',
    improve:'Building lean muscle mass (FFMI), reducing visceral fat (A:G ratio), and improving RMR through resistance training and protein-rich nutrition are the most effective strategies. Reducing processed carbohydrates and improving sleep quality accelerate metabolic rejuvenation.'
  },
  autonomic:{
    what:'Autonomic Age (labeled "Immune System" in your profile) reflects the biological age of your autonomic nervous system — the control center that regulates heart rate variability, stress response, immune function, and the balance between sympathetic (fight-or-flight) and parasympathetic (rest-and-digest) activity.',
    why:'Autonomic function is the master regulator of inflammation, immune surveillance, cardiovascular resilience, and psychological stress tolerance. Low autonomic age means your nervous system is flexible, adaptive, and anti-inflammatory. High autonomic age predicts burnout, chronic disease, poor sleep, and accelerated overall aging.',
    improve:'HRV biofeedback, mindfulness meditation, cold exposure, breathing exercises (especially resonant frequency breathing), adequate sleep (7–9 hours), and stress reduction are the most powerful autonomic age reducers. Social connection and nature exposure also measurably improve HRV.'
  },
  musculoskeletal:{
    what:'Musculoskeletal Age reflects the biological age of your muscle and skeletal system — including muscle mass relative to your frame (FFMI vs. age-expected norms), fat infiltration into muscle tissue, physical activity level, and functional lean-to-fat mass ratio.',
    why:'Muscle is the largest metabolic organ in the body and the primary buffer against insulin resistance, obesity, and frailty. Musculoskeletal age directly determines your physical independence, fall risk, and quality of life at older ages. Sarcopenia (muscle loss with aging) begins as early as age 30 and accelerates if untreated. Maintaining a younger musculoskeletal age is one of the strongest predictors of healthspan.',
    improve:'Resistance training 3–4x per week is the most powerful intervention. Protein intake of 1.6–2.2 g/kg of body weight supports muscle protein synthesis. Creatine monohydrate (5g/day) has robust evidence in all age groups. Activity level (steps, cardio minutes) directly inputs into this age calculation.'
  }
};

function AgeCardCollapsible({sys,a,se,chronoAge}){
  const[open,setOpen]=React.useState(false);
  const st=getStatus(a,chronoAge);
  const d=+(a-chronoAge).toFixed(1);
  const info=PHYS_AGE_INFO[sys.key];
  return(
    <div style={{marginBottom:14}}>
      <div className={`age-card ${st}`} style={{marginBottom:0,cursor:'pointer',borderRadius:open?'var(--radius) var(--radius) 0 0':'var(--radius)'}} onClick={()=>setOpen(v=>!v)}>
        <div className="age-card-header">
          <div><div className="age-system-name">{sys.icon} {sys.label}</div><div className={`age-value-large ${st}`}>{a}</div></div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span className={`age-diff ${st}`}>{d>0?'+':''}{d===0?'±0':d} yr</span>
            <span style={{fontSize:'.7rem',color:'var(--text-muted)',transition:'transform .3s',display:'inline-block',transform:open?'rotate(180deg)':'none'}}>▼</span>
          </div>
        </div>
        <div className="age-bar-bg"><div className="age-bar-fill" style={{width:`${clamp(a/90*100,5,100)}%`,background:`var(--${st})`}}/><div className="age-marker" style={{left:`${clamp(chronoAge/90*100,0,100)}%`}}/></div>
        <div className="age-ci">±{se} yr (95% CI)</div>
      </div>
      {open&&info&&(
        <div style={{padding:'13px 16px',background:'var(--bg-card)',border:'1px solid var(--border)',borderTop:'none',borderRadius:'0 0 var(--radius) var(--radius)',fontSize:'.74rem',color:'var(--text-dim)',lineHeight:1.65}}>
          <div style={{fontWeight:700,color:'var(--text)',marginBottom:4,fontSize:'.76rem'}}>What this age measures</div>
          <p style={{marginBottom:8}}>{info.what}</p>
          <div style={{fontWeight:700,color:'var(--text)',marginBottom:4,fontSize:'.76rem'}}>Why it matters for longevity</div>
          <p style={{marginBottom:8}}>{info.why}</p>
          <div style={{fontWeight:700,color:'var(--text)',marginBottom:4,fontSize:'.76rem'}}>How to improve it</div>
          <p style={{margin:0,padding:'8px 10px',background:'var(--bg2)',borderRadius:6,border:'1px solid var(--border)',fontSize:'.72rem'}}>{info.improve}</p>
        </div>
      )}
    </div>
  );
}

/* Goal → meal filter logic */
function getMealsForGoal(goalKey){
  const map={
    'muscle':['muscle','athletic','endurance'],
    'weight-loss':['weight-loss','longevity'],
    'endurance':['endurance','athletic','muscle'],
    'athletic':['athletic','muscle','endurance'],
    'glp1':['glp1','weight-loss','longevity'],
    'longevity':['longevity','weight-loss']
  };
  const targets=map[goalKey]||['weight-loss'];
  return FUEL_MEALS_CATALOG.filter(m=>m.goal.some(g=>targets.includes(g)));
}

/* Generate a 4-week rotating meal plan */
function generateMealPlan(mealsPerWeek,goalKey){
  const pool=getMealsForGoal(goalKey);
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const mealSlots=mealsPerWeek<=7?['Lunch/Dinner']:mealsPerWeek<=10?['Lunch','Dinner']:mealsPerWeek<=14?['Breakfast','Lunch','Dinner']:['Breakfast','Lunch','Dinner','Snack'];
  const mealsPerDay=Math.ceil(mealsPerWeek/7);
  const weeks=[];
  for(let w=0;w<4;w++){
    const weekMeals={};
    days.forEach((day,di)=>{
      weekMeals[day]=[];
      for(let s=0;s<mealsPerDay;s++){
        const idx=(w*7*mealsPerDay+di*mealsPerDay+s)%pool.length;
        weekMeals[day].push(pool[idx]);
      }
    });
    weeks.push(weekMeals);
  }
  return weeks;
}

function getSupplementsForSystem(system,status,age){
  const sysData=SUPPLEMENT_DATA[system];
  if(!sysData||!sysData[status])return null;
  const statusData=sysData[status];
  if(statusData.supps)return statusData; // overall has flat structure
  if(!statusData.ageRanges)return null;
  // Find best age range match
  const ranges=statusData.ageRanges;
  for(let i=ranges.length-1;i>=0;i--){
    const[lo]=ranges[i].range.split('-').map(Number);
    if(age>=lo)return ranges[i];
  }
  return ranges[0];
}

function generateDailyPlans(weeklyPlans){
  // Expand weekly actions into 7 days × 3 tasks per day
  const daily={};
  Object.keys(weeklyPlans).forEach(cat=>{
    daily[cat]={};
    Object.keys(weeklyPlans[cat]).forEach(status=>{
      daily[cat][status]=weeklyPlans[cat][status].map(week=>{
        const actions=week.actions;
        const days=[];
        const taskTemplates=[];
        // Generate varied daily tasks from weekly themes
        actions.forEach((a,i)=>{ taskTemplates.push(a) });
        // Build 7 days with 3 tasks each, cycling and varying
        for(let d=0;d<7;d++){
          const dayTasks=[];
          for(let t=0;t<3;t++){
            const idx=(d*3+t)%taskTemplates.length;
            let task=taskTemplates[idx];
            // Add day-specific variation
            if(d>0&&t===0){
              const prefixes=['Continue:','Focus on:','Today\'s priority:','Maintain:','Build on:','Progress:','Advance:'];
              task=prefixes[d%prefixes.length]+' '+task.charAt(0).toLowerCase()+task.slice(1);
            }
            dayTasks.push(task);
          }
          days.push({day:d,tasks:dayTasks});
        }
        return{week:week.week,title:week.title,days};
      });
    });
  });
  return daily;
}

/* Helper: get Fuel Meals recommendations for a given program + day */
function getFuelMealsForDay(programKey, dayIdx, weekIdx) {
  const programGoalMap = {
    diet: ['weight-loss','longevity'],
    exercise: ['muscle','athletic'],
    sleep: ['longevity','weight-loss'],
    mental: ['longevity','weight-loss'],
    glp1: ['glp1','weight-loss'],
    healthyAging: ['longevity','weight-loss'],
    eliteAthlete: ['athletic','muscle','endurance'],
    chronicPrevention: ['weight-loss','longevity'],
    youthMentalHealth: ['muscle','athletic']
  };
  const goals = programGoalMap[programKey] || ['muscle','weight-loss'];
  const matching = FUEL_MEALS_CATALOG.filter(m => m.goal && goals.some(g => m.goal.includes(g)));
  const pool = matching.length > 0 ? matching : FUEL_MEALS_CATALOG;
  // Pick 2 different meals per day, rotating by day+week seed for variety
  const seed = dayIdx * 7 + weekIdx * 13;
  const idx1 = seed % pool.length;
  const idx2 = (seed + Math.ceil(pool.length / 2) + weekIdx) % pool.length;
  const meals = [pool[idx1]];
  if (idx2 !== idx1) meals.push(pool[idx2]);
  return meals;
}

                    whyReasons.push(`High protein (${meal.protein}g) matched to your muscle gain goal`);
                  }
                  if((goalLower.includes('energy')||goalLower.includes('perform'))&&meal.carbs>=50){
                    whyReasons.push('Energy-dense carbohydrates aligned with your performance goal');
                  }
                }
                
                // Default if no specific reasons generated
                if(whyReasons.length===0){
                  if(meal.protein>=50)whyReasons.push(`High-protein (${meal.protein}g) meal aligned with ${programLabel} program`);
                  else whyReasons.push(`Macro-balanced meal selected for your ${programLabel} program`);
                }
                
                return(
                <div key={mi} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:12,overflow:'hidden',boxShadow:'var(--shadow-xs)',marginBottom:2}}>
                  {/* Meal image + header row */}
                  <div style={{display:'flex',minHeight:100}}>
                    <div style={{width:110,minWidth:110,position:'relative',overflow:'hidden',background:'#f0f0f0',flexShrink:0}}>
                      {meal.img
                        ? <img src={meal.img} alt={meal.name} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}} onError={e=>{e.target.style.display='none';e.target.parentNode.style.background='linear-gradient(135deg,#0077C812,#E3183710)';}}/>
                        : <div style={{width:'100%',height:'100%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'2rem',background:'linear-gradient(135deg,#0077C812,#E3183710)'}}>{'\u{1F37D}'}</div>
                      }
                    </div>
                    <div style={{flex:1,padding:'10px 12px',display:'flex',flexDirection:'column',justifyContent:'space-between',minWidth:0}}>
                      <div>
                        <div style={{fontSize:'.82rem',fontWeight:700,color:'var(--text)',lineHeight:1.3,marginBottom:3}}>{meal.name}</div>
                        <div style={{fontSize:'.68rem',color:'var(--text-dim)',lineHeight:1.4}}>{meal.desc}</div>
                      </div>
                      <div style={{display:'flex',gap:4,marginTop:8,flexWrap:'wrap'}}>
                        <span style={{fontSize:'.6rem',fontWeight:600,color:'var(--text)',background:'var(--bg2)',borderRadius:5,padding:'2px 6px'}}>{meal.cal} cal</span>
                        <span style={{fontSize:'.6rem',fontWeight:600,color:'#0077C8',background:'rgba(0,119,200,.10)',borderRadius:5,padding:'2px 6px'}}>{meal.protein}g protein</span>
                        <span style={{fontSize:'.6rem',color:'var(--text-muted)',background:'var(--bg2)',borderRadius:5,padding:'2px 6px'}}>{meal.carbs}g carbs</span>
                        <span style={{fontSize:'.6rem',color:'var(--text-muted)',background:'var(--bg2)',borderRadius:5,padding:'2px 6px'}}>{meal.fat}g fat</span>
                      </div>
                    </div>
                  </div>
                  {/* Why Recommended */}
                  <div style={{borderTop:'1px solid var(--border)',padding:'8px 12px',background:'rgba(227,24,55,.03)'}}>
                    <div style={{fontSize:'.58rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'#E31837',marginBottom:5}}>⚡ Why Recommended for You</div>
                    <div style={{display:'flex',flexDirection:'column',gap:3}}>
                      {whyReasons.slice(0,2).map((r,ri)=>(
                        <div key={ri} style={{display:'flex',alignItems:'flex-start',gap:5}}>
                          <span style={{color:'#E31837',fontSize:'.62rem',marginTop:1,flexShrink:0}}>✓</span>
                          <span style={{fontSize:'.65rem',color:'var(--text-dim)',lineHeight:1.4}}>{r}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
                );
              })}
            </div>
            <a href="https://getfuelmeals.com" target="_blank" rel="noopener noreferrer" style={{textDecoration:'none',display:'block',marginTop:10}}>
              <button style={{background:'linear-gradient(135deg,#E31837,#c41230)',color:'white',fontSize:'.8rem',padding:'12px',width:'100%',border:'none',borderRadius:8,cursor:'pointer',fontWeight:600,letterSpacing:'.02em',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
                <span>Order from Fuel Meals</span><span style={{opacity:.8}}>getfuelmeals.com &rarr;</span>
              </button>
            </a>
          </div>
        );
      })()}

      {/* Objectives */}
      <div className="principles-card" style={{marginTop:14}}>
        <div className="principles-title">Program Objectives</div>
        {m.objectives.map((o,i)=>(
          <div key={i} className="principle-item"><span className="principle-icon">◆</span><div style={{color:'var(--text-dim)'}}>{o}</div></div>
        ))}
      </div>

      <button className="btn btn-secondary" style={{marginTop:16}} onClick={()=>setActiveProgram(null)}>← Back to All Programs</button>
      <button className="btn btn-sim" style={{marginTop:8}} onClick={onUpdate}>🔄 Update Your Assessment</button>
    </div>
  );
}

};

  foundation:{icon:'⭐',title:'Foundation Stack',coverBg:'linear-gradient(135deg,#065f46,#0077C8)',coverImg:'https://images.unsplash.com/photo-1544991875-5dc1b05f0f8c?w=600&q=80&auto=format&fit=crop',desc:'Core supplements recommended across multiple body systems for overall longevity support.'},
  cardiovascular:{icon:'♥',title:'Cardiovascular Support',coverBg:'linear-gradient(135deg,#991b1b,#dc2626)',coverImg:'https://images.unsplash.com/photo-1559757175-0eb30cd8c063?w=600&q=80&auto=format&fit=crop',desc:'Targeted supplements for heart health, circulation, and vascular function.'},

};

function Screen10Supps({ages,chronoAge,userData,onBack,onNext,onSimulator,onUpdate}){
  const[activeSystem,setActiveSystem]=useState(null);
  const age=Number(userData.age);
  const systems=[
    {key:'cardiovascular',label:'Cardiovascular',icon:'♥',css:'cv'},
    {key:'metabolic',label:'Metabolic',icon:'⚡',css:'met'},
    {key:'autonomic',label:'Immune System',icon:'🧠',css:'auto'},
    {key:'musculoskeletal',label:'Musculoskeletal',icon:'💪',css:'msk'}
  ];

  const oStatus=getStatus(ages.overall,chronoAge);
  const overallSupps=SUPPLEMENT_DATA.overall[oStatus];

  // Build per-system supplement lists
  const systemSupps={};
  const suppCounts={};
  systems.forEach(sys=>{
    const status=getStatus(ages[sys.key].age,chronoAge);
    const rec=getSupplementsForSystem(sys.key,status,age);
    systemSupps[sys.key]=rec;
    if(rec&&rec.supps)rec.supps.forEach(s=>{suppCounts[s.name]=(suppCounts[s.name]||0)+1});
  });

  // Foundation = supplements in 3+ systems
  const seenFoundation=new Set();
  const foundationSupps=[];
  systems.forEach(sys=>{
    const rec=systemSupps[sys.key];
    if(rec&&rec.supps)rec.supps.forEach(s=>{
      if(suppCounts[s.name]>=3&&!seenFoundation.has(s.name)){
        seenFoundation.add(s.name);
        foundationSupps.push(s);
      }
    });
  });

  if(!activeSystem){
    // Hub view — system cards
    const categories=[
      {key:'foundation',supps:foundationSupps,rationale:overallSupps?.rationale||'Core supplements for overall health.'},
      ...systems.map(sys=>({key:sys.key,supps:systemSupps[sys.key]?.supps||[],rationale:systemSupps[sys.key]?.rationale||''}))
    ];
    return(
      <div className="fade-in">
        <div className="screen-header"><div className="screen-step">Step 10 of 11</div><div className="screen-title">Your Supplement Stack</div><div className="screen-subtitle">Personalized based on your physiological age profile</div></div>
        <div className="stagger">
          {categories.map(cat=>{
            const m=SUPP_SYSTEM_META[cat.key];
            if(!m)return null;
            const count=cat.key==='foundation'?foundationSupps.length:(systemSupps[cat.key]?.supps?.length||0);
            return(
              <div key={cat.key} className="prog-card" onClick={()=>setActiveSystem(cat.key)}>
                <div className="prog-cover" style={{background:m.coverBg,height:110,position:'relative',overflow:'hidden'}}>
                  {m.coverImg&&<img src={m.coverImg} alt={m.title} style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',opacity:0.5}} onError={e=>{e.target.style.display='none';e.target.parentNode.querySelector('.prog-cover-icon').style.display='flex'}}/>}
                  <div className="prog-cover-gradient"/>
                  <span className="prog-cover-icon" style={{display:m.coverImg?'none':'flex'}}>{m.icon}</span>
                </div>
                <div className="prog-body">
                  <div className="prog-title">{m.title}</div>
                  <div className="prog-desc">{m.desc}</div>
                  <div className="prog-meta"><span className="prog-meta-item">💊 {count} supplements</span></div>
                </div>
                {THORNE_LINKS[cat.key]&&(
                  <a href={THORNE_LINKS[cat.key]} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,padding:'12px 16px',borderTop:'1px solid var(--border)',textDecoration:'none',transition:'background .2s ease'}} onMouseOver={e=>e.currentTarget.style.background='var(--bg2)'} onMouseOut={e=>e.currentTarget.style.background='transparent'}>
                    <img src={THORNE_IMG} alt="Thorne" style={{height:18,objectFit:'contain'}}/>
                    <span style={{fontSize:'.72rem',color:'var(--text-dim)',fontWeight:500}}>Buy Your {cat.key==='foundation'?'Healthy Aging':m.title.replace(' Support','')} Supplements</span>
                  </a>
                )}
              </div>
            );
          })}
        </div>

        <div style={{fontSize:'.68rem',color:'var(--text-muted)',lineHeight:1.5,marginTop:14,padding:'12px',background:'var(--bg2)',borderRadius:'var(--radius-sm)'}}>
          ⚠️ These recommendations are for informational purposes only. Consult your healthcare provider before starting any supplement regimen.
        </div>

        <button className="btn btn-sim" style={{marginTop:16}} onClick={onSimulator}>🔬 What-If Simulator</button>
        <button className="btn btn-secondary" style={{marginTop:8}} onClick={onBack}>← Back to Results</button>
        <button className="btn btn-sim" style={{marginTop:8}} onClick={onUpdate}>🔄 Update Your Assessment</button>
      </div>
    );
  }

  // Detail view for a specific system
  const m=SUPP_SYSTEM_META[activeSystem];
  const isFoundation=activeSystem==='foundation';
  const supps=isFoundation?foundationSupps:(systemSupps[activeSystem]?.supps||[]);
  const rationale=isFoundation?(overallSupps?.rationale||''):(systemSupps[activeSystem]?.rationale||'');
  const thorneLink=THORNE_LINKS[activeSystem];

  return(
    <div className="fade-in" key={activeSystem}>
      {/* Hero */}
      <div className="prog-detail-hero" style={{background:m.coverBg}}>
        {m.coverImg&&<img src={m.coverImg} alt={m.title} style={{position:'absolute',inset:0,width:'100%',height:'100%',objectFit:'cover',opacity:0.45}} onError={e=>{e.target.style.display='none';e.target.parentNode.querySelector('.prog-detail-hero-icon').style.display='flex'}}/>}
        <div className="prog-detail-hero-overlay"/>
        <div className="prog-detail-hero-content">
          <div className="prog-detail-hero-icon" style={{display:m.coverImg?'none':'flex'}}>{m.icon}</div>
          <div className="prog-detail-hero-title">{m.title}</div>
          <div className="prog-detail-hero-week">{supps.length} Recommended Supplements</div>
        </div>
      </div>

      {/* Rationale */}
      {rationale&&(
        <div className="supp-rationale" style={{marginBottom:16}}>{rationale}</div>
      )}

      {/* Supplement list */}
      <div className="stagger">
        {supps.map((s,i)=>(
          <div key={i} className="supp-card">

      {/* Thorne buy link */}
      {thorneLink&&(
        <a href={thorneLink} target="_blank" rel="noopener noreferrer" style={{display:'flex',alignItems:'center',justifyContent:'center',gap:10,padding:'16px',background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius)',textDecoration:'none',marginTop:16,boxShadow:'var(--shadow-sm)',transition:'all .25s ease'}} onMouseOver={e=>{e.currentTarget.style.boxShadow='var(--shadow-md)';e.currentTarget.style.transform='translateY(-1px)'}} onMouseOut={e=>{e.currentTarget.style.boxShadow='var(--shadow-sm)';e.currentTarget.style.transform='none'}}>

}

/* Screen 11: What-If Simulator */
function Screen11({userData,fingerData,bodyData,ages:originalAges,onBack,onReset}){
  const chronoAge=Number(userData.age);
  const[simWeight,setSimWeight]=useState(Number(userData.weight)||70);
  const[simHR,setSimHR]=useState(fingerData.heartRate);
  const[simSteps,setSimSteps]=useState(userData.steps);
  const[simCardio,setSimCardio]=useState(userData.cardioMin);
  const[simSleep,setSimSleep]=useState(userData.sleepHours);
  const[simEnergy,setSimEnergy]=useState(userData.energyLevel);

  const simWeightLbs=Math.round(simWeight*2.20462);
  const setSimWeightFromLbs=(lb)=>setSimWeight(Math.round(lb*0.453592*10)/10);

  // Pass bodyData as-is; calculatePhysiologicalAges anchors lean mass internally
  // and derives FMI/agRatio from the overridden weight, so lower weight always = better metabolic age
  const simAges=useMemo(()=>{
    return calculatePhysiologicalAges(userData, fingerData, bodyData, {
      weight:simWeight, heartRate:simHR, steps:simSteps, cardioMin:simCardio,
      sleepHours:simSleep, energyLevel:simEnergy
    });
  },[simWeight,simHR,simSteps,simCardio,simSleep,simEnergy]);

  const delta=+(simAges.overall-originalAges.overall).toFixed(1);
  const simStatus=getStatus(simAges.overall,chronoAge);
  const systems=[
    {key:'cardiovascular',label:'Cardio',icon:'♥'},
    {key:'metabolic',label:'Metabolic',icon:'⚡'},
    {key:'autonomic',label:'Immune',icon:'🧠'},
    {key:'musculoskeletal',label:'Muscle',icon:'💪'}
  ];

  const simBMI=+(simWeight/((userData.height/100)**2)).toFixed(1);

  return(
    <div className="fade-in">
      <div className="screen-header">
        <div className="screen-step">Simulator</div>
        <div className="screen-title">What If…</div>
        <div className="screen-subtitle">Adjust any factor and see your physiological age update instantly</div>
      </div>

      <div className="sim-result">
        <div className="sim-result-label">Simulated Overall Age</div>
        <div className="sim-result-age" style={{color:`var(--${simStatus})`}}>{simAges.overall}</div>
        {delta!==0&&<div className="sim-delta" style={{background:delta<0?'rgba(0,119,200,.1)':'rgba(217,119,6,.1)',color:delta<0?'var(--younger)':'var(--older)'}}>{delta>0?'+':''}{delta} from current</div>}
        {delta===0&&<div className="sim-delta" style={{background:'rgba(146,39,143,.1)',color:'var(--same)'}}>No change</div>}
      </div>

      <div className="sim-comparison stagger">
        {systems.map(s=>{
          const orig=originalAges[s.key].age;
          const sim=simAges[s.key].age;
          const d=+(sim-orig).toFixed(1);
          const st=getStatus(sim,chronoAge);
          return(
            <div key={s.key} className="sim-comp-card">
              <div className="sim-comp-label">{s.icon} {s.label}</div>
              <div className="sim-comp-val" style={{color:`var(--${st})`}}>{sim}</div>
              {d!==0&&<div style={{fontSize:'.62rem',color:d<0?'var(--younger)':'var(--older)',fontWeight:600}}>{d>0?'+':''}{d}</div>}
            </div>
          );
        })}
      </div>

      {/* Weight */}
      <div className="sim-card">
        <div className="sim-row">
          <div className="sim-input">
            <div className="sim-label">⚖️ Weight · <span style={{color:'var(--accent)',fontWeight:700}}>{simWeightLbs} lbs</span> · BMI {simBMI}
              {simBMI < 18.5 && <span style={{marginLeft:8,fontSize:'.65rem',color:'#ef4444',fontWeight:700}}>⚠ Underweight</span>}
              {simBMI >= 18.5 && simBMI <= 24.9 && <span style={{marginLeft:8,fontSize:'.65rem',color:'#22c55e',fontWeight:700}}>✓ Healthy range</span>}
              {simBMI > 24.9 && simBMI <= 29.9 && <span style={{marginLeft:8,fontSize:'.65rem',color:'#f59e0b',fontWeight:700}}>Overweight</span>}
              {simBMI > 29.9 && <span style={{marginLeft:8,fontSize:'.65rem',color:'#ef4444',fontWeight:700}}>Obese</span>}
            </div>
            <input type="range" className="slider-track" min={100} max={320} step="1"
              value={Math.min(320,Math.max(100,simWeightLbs))}
              onChange={e=>setSimWeightFromLbs(Number(e.target.value))}/>
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:'.6rem',color:'var(--text-muted)',marginTop:2}}><span>100 lbs</span><span>320 lbs</span></div>
        {simBMI < 18.5
          ? <div style={{fontSize:'.62rem',color:'#ef4444',marginTop:4,fontWeight:600}}>⚠ BMI below 18.5 adds physiological age — underweight increases frailty risk</div>
          : <div style={{fontSize:'.62rem',color:'var(--text-muted)',marginTop:4}}>Optimal BMI 20–25 minimises age penalty · ↓ fat mass index → younger metabolic age</div>
        }
      </div>

      {/* Heart Rate */}
      <div className="sim-card">
        <div className="sim-row">
          <div className="sim-input">
            <div className="sim-label">♥ Resting Heart Rate · <span style={{color:'var(--accent)',fontWeight:700}}>{simHR} bpm</span></div>
            <input type="range" className="slider-track" min={45} max={95} step="1"
              value={simHR} onChange={e=>setSimHR(Number(e.target.value))}/>
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:'.6rem',color:'var(--text-muted)',marginTop:2}}><span>45 bpm (athletic)</span><span>95 bpm (high)</span></div>
        <div style={{fontSize:'.62rem',color:'var(--text-muted)',marginTop:4}}>↓ HR → younger cardiovascular age</div>
      </div>

      {/* Steps */}
      <div className="sim-card">
        <div className="sim-row">
          <div className="sim-input">
            <div className="sim-label">🚶 Daily Steps · <span style={{color:'var(--accent)',fontWeight:700}}>{simSteps>=10000?'10,000+':simSteps.toLocaleString()}</span></div>
            <input type="range" className="slider-track" min={0} max={15000} step={500}
              value={simSteps} onChange={e=>setSimSteps(Number(e.target.value))}/>
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:'.6rem',color:'var(--text-muted)',marginTop:2}}><span>0</span><span>15,000+</span></div>
        <div style={{fontSize:'.62rem',color:'var(--text-muted)',marginTop:4}}>↑ steps → ↑ VO₂max + ↑ activity → younger CV + muscle ages</div>
      </div>

      {/* Cardio */}
      <div className="sim-card">
        <div className="sim-row">
          <div className="sim-input">
            <div className="sim-label">🏃 Cardio Min/Day · <span style={{color:'var(--accent)',fontWeight:700}}>{simCardio} min</span></div>
            <input type="range" className="slider-track" min={0} max={120} step={5}
              value={simCardio} onChange={e=>setSimCardio(Number(e.target.value))}/>
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:'.6rem',color:'var(--text-muted)',marginTop:2}}><span>0 min</span><span>120 min</span></div>
        <div style={{fontSize:'.62rem',color:'var(--text-muted)',marginTop:4}}>↑ cardio → ↑ VO₂max → younger cardiovascular + musculoskeletal ages</div>
      </div>

      {/* Sleep */}
      <div className="sim-card">
        <div className="sim-row">
          <div className="sim-input">
            <div className="sim-label">🌙 Sleep Hours · <span style={{color:'var(--accent)',fontWeight:700}}>{simSleep}h</span></div>
            <input type="range" className="slider-track" min={4} max={10} step={0.5}
              value={simSleep} onChange={e=>setSimSleep(Number(e.target.value))}/>
          </div>
        </div>
        <div style={{display:'flex',justifyContent:'space-between',fontSize:'.6rem',color:'var(--text-muted)',marginTop:2}}><span>4h</span><span>10h</span></div>
        <div style={{fontSize:'.62rem',color:'var(--text-muted)',marginTop:4}}>↑ sleep → younger autonomic + cardiovascular ages</div>
      </div>

      {/* Energy */}
      <div className="sim-card">
        <div className="sim-label" style={{marginBottom:8}}>⚡ Energy Level · <span style={{color:'var(--accent)',fontWeight:700}}>{['Very Low','Low','Moderate','High','Very High'][simEnergy-1]}</span></div>
        <div style={{display:'flex',gap:6}}>
          {['Very Low','Low','Moderate','High','Very High'].map((l,i)=>(
            <button key={i}
              onClick={()=>setSimEnergy(i+1)}
              style={{flex:1,padding:'8px 2px',borderRadius:8,border:`1.5px solid ${simEnergy===i+1?'var(--accent)':'var(--border)'}`,
                background:simEnergy===i+1?'rgba(0,119,200,.1)':'var(--bg2)',
                color:simEnergy===i+1?'var(--accent)':'var(--text-dim)',
                fontSize:'.58rem',fontWeight:simEnergy===i+1?700:400,cursor:'pointer',fontFamily:'var(--sans)',lineHeight:1.3}}>
              {l}
            </button>
          ))}
        </div>
        <div style={{fontSize:'.62rem',color:'var(--text-muted)',marginTop:6}}>↑ energy → younger autonomic age (reflects stress load, recovery, nervous system health)</div>
      </div>

      <div style={{marginTop:10,padding:'8px 12px',background:'var(--bg2)',borderRadius:'var(--radius-xs)',border:'1px solid var(--border)',fontSize:'.68rem',color:'var(--text-muted)',lineHeight:1.55}}>
        Bounds: max improvement <strong style={{color:'var(--younger)'}}>−{(chronoAge*0.14).toFixed(1)} yrs</strong> · max adverse <strong style={{color:'var(--older)'}}>+{(chronoAge*0.115).toFixed(1)} yrs</strong> from chronological age of {chronoAge}
      </div>

      <button className="btn btn-secondary" style={{marginTop:16}} onClick={onBack}>← Back to Results</button>
    </div>
  );
}

/* Screen Update: Quick reassessment — weight + lifestyle only */
function ScreenUpdate({userData,setUserData,onDone}){
  const[lbs,setLbs]=useState(userData.weightLbs||Math.round((Number(userData.weight)||0)*2.20462));
  const update=(k,v)=>{
    if(k==='weightLbs'){
      setLbs(v);
      const weightKg=Number(v)*0.453592;
      const hm=userData.height/100;
      const bmi=hm>0?+(weightKg/(hm*hm)).toFixed(1):0;
      setUserData(prev=>({...prev,weight:Math.round(weightKg*10)/10,weightLbs:v,bmi}));
    } else {
      setUserData(prev=>({...prev,[k]:v}));
    }
  };
  const energyLabels=['Very Low','Low','Moderate','High','Very High'];
  const canSubmit=lbs>0;
  return(
    <div className="fade-in">
      <div className="screen-header"><div className="screen-step">Update</div><div className="screen-title">Update Assessment</div><div className="screen-subtitle">Update your current metrics to recalculate your physiological age</div></div>
      <div className="card">
        <div className="form-row">
          <div className="form-group"><label className="form-label">Weight (lbs)</label><input className="form-input" type="number" value={lbs} onChange={e=>update('weightLbs',Number(e.target.value))} placeholder="lbs"/></div>
          <div className="form-group"><label className="form-label">BMI</label><div className="bmi-display"><div className="bmi-value">{userData.bmi||'—'}</div></div></div>
        </div>
      </div>
      <div className="card">
        <div className="slider-group">
          <div className="slider-header"><label className="form-label" style={{margin:0}}>Average Daily Steps</label><span className="slider-value">{userData.steps>=10000?'10,000+':userData.steps.toLocaleString()}</span></div>
          <input type="range" className="slider-track" min="0" max="10000" step="1000" value={userData.steps} onChange={e=>update('steps',Number(e.target.value))}/>
          <div className="slider-labels"><span>0</span><span>5,000</span><span>10,000+</span></div>
        </div>
        <div className="slider-group">
          <div className="slider-header"><label className="form-label" style={{margin:0}}>Avg. Cardio Minutes / Day</label><span className="slider-value">{userData.cardioMin} min</span></div>
          <input type="range" className="slider-track" min="0" max="120" step="5" value={userData.cardioMin} onChange={e=>update('cardioMin',Number(e.target.value))}/>
          <div className="slider-labels"><span>0</span><span>60</span><span>120</span></div>
        </div>
        <div className="slider-group">
          <div className="slider-header"><label className="form-label" style={{margin:0}}>Avg. Sleep Hours / Night</label><span className="slider-value">{userData.sleepHours} hrs</span></div>
          <input type="range" className="slider-track" min="4" max="10" step="0.5" value={userData.sleepHours} onChange={e=>update('sleepHours',Number(e.target.value))}/>
          <div className="slider-labels"><span>4h</span><span>7h</span><span>10h</span></div>
        </div>
        <div className="form-group">
          <label className="form-label">Energy Level (Last Week)</label>
          <div className="energy-selector">
            {energyLabels.map((l,i)=>(
              <button key={i} className={`energy-btn ${userData.energyLevel===i+1?'active':''}`} onClick={()=>update('energyLevel',i+1)}>{l}</button>
            ))}
          </div>
        </div>
      </div>
      <button className="btn btn-primary" disabled={!canSubmit} onClick={onDone}>Recalculate My Age →</button>
    </div>
  );
}
