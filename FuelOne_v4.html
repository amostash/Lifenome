function ScreenReferences({onBack}){
  const[openCat,setOpenCat]=useState(null);
  const[openRef,setOpenRef]=useState({});
  const[openLim,setOpenLim]=useState({});

  const toggleCat=key=>setOpenCat(o=>o===key?null:key);
  const toggleRef=(catKey,refId)=>setOpenRef(o=>({...o,[catKey+refId]:!o[catKey+refId]}));
  const toggleLim=catKey=>setOpenLim(o=>({...o,[catKey]:!o[catKey]}));

  return(
    <div className="fade-in">
      <div className="screen-header">
        <div className="screen-step">Scientific Foundation</div>
        <div className="screen-title">References</div>
        <div className="screen-subtitle">Peer-reviewed evidence supporting VitalAge methodology</div>
      </div>

      {/* Summary badge row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:20}}>
        {[['📄','16','Peer-Reviewed\nStudies'],['🔬','3','Validated\nMethodologies'],['🏛️','2025','Most Recent\nEvidence']].map(([icon,num,label])=>(
          <div key={label} style={{background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',padding:'12px 8px',textAlign:'center'}}>
            <div style={{fontSize:'1.4rem'}}>{icon}</div>
            <div style={{fontFamily:'var(--serif)',fontSize:'1.3rem',fontWeight:700,color:'var(--accent)',lineHeight:1}}>{num}</div>
            <div style={{fontSize:'.62rem',color:'var(--text-dim)',lineHeight:1.3,marginTop:4,whiteSpace:'pre-line'}}>{label}</div>
          </div>
        ))}
      </div>

      {REFERENCES_DATA.map(cat=>{
        const isOpen=openCat===cat.category;
        return(
          <div key={cat.category} style={{marginBottom:12,border:`1px solid ${isOpen?cat.accent:'var(--border)'}`,borderRadius:'var(--radius)',overflow:'hidden',transition:'border-color .25s'}}>
            {/* Category header — always visible */}
            <button onClick={()=>toggleCat(cat.category)} style={{width:'100%',background:isOpen?`linear-gradient(135deg,${cat.accent}18,${cat.accent}08)`:'var(--bg-card)',border:'none',cursor:'pointer',padding:'16px 14px',display:'flex',alignItems:'center',gap:12,textAlign:'left',transition:'background .25s'}}>
              <span style={{fontSize:'1.6rem',lineHeight:1}}>{cat.icon}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:'.9rem',fontWeight:700,color:'var(--text)',letterSpacing:'-.01em'}}>{cat.category}</div>
                <div style={{fontSize:'.72rem',color:'var(--text-muted)',marginTop:2}}>{cat.items.length} studies · tap to expand</div>
              </div>
              <span style={{fontSize:'1rem',color:cat.accent,transition:'transform .25s',transform:isOpen?'rotate(180deg)':'rotate(0deg)'}}>▼</span>
            </button>

            {isOpen&&(
              <div style={{padding:'0 14px 14px',background:'var(--bg2)'}}>
                {/* Intro paragraph */}
                <p style={{fontSize:'.78rem',color:'var(--text-dim)',lineHeight:1.6,marginBottom:14,paddingTop:12,borderTop:'1px solid var(--border)'}}>{cat.intro}</p>

                {/* Individual references */}
                {cat.items.map(ref=>{
                  const rKey=cat.category+ref.id;
                  const rOpen=openRef[rKey];
                  return(
                    <div key={ref.id} style={{marginBottom:8,border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',overflow:'hidden',background:'var(--bg-card)'}}>
                      <button onClick={()=>toggleRef(cat.category,ref.id)} style={{width:'100%',background:'none',border:'none',cursor:'pointer',padding:'10px 12px',display:'flex',alignItems:'flex-start',gap:10,textAlign:'left'}}>
                        <div style={{flex:1}}>
                          <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap',marginBottom:4}}>
                            <span style={{fontSize:'.58rem',fontWeight:700,padding:'2px 6px',borderRadius:4,background:`${cat.accent}22`,color:cat.accent,letterSpacing:'.04em',textTransform:'uppercase'}}>{ref.quality}</span>
                            <span style={{fontSize:'.62rem',color:'var(--text-muted)'}}>{ref.year}</span>
                          </div>
                          <div style={{fontSize:'.78rem',fontWeight:600,color:'var(--text)',lineHeight:1.4}}>{ref.title}</div>
                          <div style={{fontSize:'.68rem',color:'var(--text-muted)',marginTop:2}}>{ref.authors.length>60?ref.authors.slice(0,57)+'…':ref.authors}</div>
                        </div>
                        <span style={{fontSize:'.85rem',color:'var(--text-muted)',marginTop:2,transition:'transform .2s',transform:rOpen?'rotate(180deg)':'rotate(0deg)',flexShrink:0}}>▼</span>
                      </button>

                      {rOpen&&(
                        <div style={{padding:'0 12px 12px',borderTop:'1px solid var(--border)'}}>
                          {/* Journal + DOI */}
                          <div style={{fontSize:'.68rem',color:'var(--text-dim)',fontStyle:'italic',marginBottom:8}}>{ref.journal} · DOI: {ref.doi}</div>
                          {/* Key finding */}
                          <div style={{background:`${cat.accent}0d`,border:`1px solid ${cat.accent}30`,borderRadius:'var(--radius-sm)',padding:'10px 12px',marginBottom:8}}>
                            <div style={{fontSize:'.62rem',fontWeight:700,color:cat.accent,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:4}}>Key Finding</div>
                            <div style={{fontSize:'.76rem',color:'var(--text)',lineHeight:1.6}}>{ref.finding}</div>
                          </div>
                          {/* Tags */}
                          <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                            {ref.tags.map(t=>(
                              <span key={t} style={{fontSize:'.6rem',padding:'2px 7px',borderRadius:10,background:'var(--bg2)',border:'1px solid var(--border)',color:'var(--text-muted)',fontWeight:500}}>{t}</span>
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}

                {/* Limitations section */}
                <div style={{marginTop:12,border:'1px solid rgba(234,179,8,.3)',borderRadius:'var(--radius-sm)',overflow:'hidden'}}>
                  <button onClick={()=>toggleLim(cat.category)} style={{width:'100%',background:'rgba(234,179,8,.06)',border:'none',cursor:'pointer',padding:'10px 12px',display:'flex',alignItems:'center',gap:8,textAlign:'left'}}>
                    <span style={{fontSize:'.85rem'}}>⚠️</span>
                    <span style={{fontSize:'.78rem',fontWeight:600,color:'#ca8a04',flex:1}}>Known Limitations & Caveats</span>
                    <span style={{fontSize:'.8rem',color:'#ca8a04',transition:'transform .2s',transform:openLim[cat.category]?'rotate(180deg)':'rotate(0deg)'}}>▼</span>
                  </button>
                  {openLim[cat.category]&&(
                    <div style={{padding:'8px 12px 12px',background:'rgba(234,179,8,.04)'}}>
                      {cat.limitations.map((lim,i)=>(
                        <div key={i} style={{display:'flex',gap:8,marginBottom:6,fontSize:'.75rem',color:'var(--text-dim)',lineHeight:1.5}}>
                          <span style={{color:'#ca8a04',flexShrink:0,marginTop:1}}>•</span>
                          <span>{lim}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        );
      })}

      {/* Disclaimer */}
      <div style={{marginTop:16,padding:'12px 14px',background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius-sm)',fontSize:'.7rem',color:'var(--text-dim)',lineHeight:1.6}}>
        <strong style={{color:'var(--text)'}}>Disclosure:</strong> VitalAge is a wellness tool, not a medical device. Physiological age estimates are derived from validated algorithms applied to consumer-grade measurements and are intended to support health awareness — not to diagnose, treat, or replace clinical assessment. For medical decisions, consult a licensed healthcare provider.
      </div>

      <button className="btn btn-secondary" style={{marginTop:16}} onClick={onBack}>← Back to Dashboard</button>
    </div>
  );
}


window.onerror = function(msg, src, line, col, err) {
  document.getElementById('root').innerHTML = '<div style="padding:20px;font-family:monospace;color:red;background:#fff;"><h2>JS Error</h2><p>' + msg + '</p><p>Line: ' + line + '</p><pre>' + (err && err.stack ? err.stack : '') + '</pre></div>';
  return false;
};
try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
} catch(e) {
  document.getElementById('root').innerHTML = '<div style="padding:20px;font-family:monospace;color:red;background:#fff;"><h2>Render Error</h2><pre>' + e.message + '</pre><pre>' + e.stack + '</pre></div>';
}
</script>
</body>
</html>
